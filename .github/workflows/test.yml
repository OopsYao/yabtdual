name: Test
on: [push]
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with: { python-version-file: '.python-version' }
      - run: uv sync --group dev
      - run: uv run ruff check